<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Distributed Job Scheduler</title>
	<style>
		body{
			font-family: system-ui, sans-serif;
			background-color: #e6e6ffe1;
			padding: 2rem;
		}
		.card{
			background-color: white;
			padding: 2rem;
			border-radius: 8px;
			box-shadow: 0 2px 5px rgba(0,0,0,0.1);
			max-width: 600px;
			margin: auto;
		}
		.terminal{
			background-color: #151515;
			color: #00f500;
			padding: 1rem;
			border-radius: 4px;
			font-family: 'Courier New', Courier, monospace;
			white-space: pre-wrap;
			margin-top: 1rem;
			min-height: 150px;
		}
		.error{
			color: #ff2a2a;
			font-weight: bold;
		}
		button{
			background-color: #03364a;
			color: rgb(255, 255, 255);
			border: none;
			padding: 0.2rem 1rem;
			border-radius: 4px;
			cursor: pointer;
		}
		button:disabled{
			background-color: #cccccc;
			color: #666666;
			cursor: not-allowed;
		}
	</style>
</head>
<body>
<script>
	const API_URL = 'http://localhost:3000';
	async function checkAuth(){
		const token = localStorage.getItem('token');
		if(!token){
			alert('You are not logged in. Redirecting to login page.');
			window.location.href = 'login.html';
			return;
		}
		try{
			const verifyResponse = await fetch(`${API_URL}/verify`, {
				method: 'GET',
				headers: {
					'Authorization': `Bearer ${token}`
				}
			});
			if (!verifyResponse.ok) {
				alert('Invalid access. Please log in again.');
				//localStorage.removeItem('token');
				window.location.href = 'login.html';
				return;
			}
		}catch(err){
			console.error(err);
			alert(`Unable to load page. Try again later`);
			window.location.href = 'login.html';
		}
	}
	checkAuth();
</script>
<div class="card">
	<h2>Submit Project</h2>
	<input type="file" id="fileZip" accept=".zip"/>
	<select id="lang">
		<option value="python">Python</option>
		<option value="c">C</option>
		<option value="c++">C++</option>
	</select>
	<select id="mode">
		<option value="1">With Makefile</option>
		<option value="0">Without Makefile</option>
	</select>
	<input type="number" id="timeout" placeholder="Timeout" value="5" min="1" max="7200"/>
	<select id="timeoutUnit" value="seconds">
		<option value="seconds">Seconds</option>
		<option value="minutes">Minutes</option>
		<option value="hours">Hours</option>
	</select>
	<button id="submitBtn" onclick="submitJob()">Run</button>
	<h3 id="statusText" style="margin-top: 2rem;">No Job Submitted</h3>
	<div id="output" class="terminal">Output will appear here...</div>
</div>
<script>
	async function submitJob(){
		const fileInput = document.getElementById('fileZip');
		const lang = document.getElementById('lang');
		const mode = document.getElementById('mode');
		const btn = document.getElementById('submitBtn');
		const statusText = document.getElementById('statusText');
		const outputTerminal = document.getElementById('output');
		const token = localStorage.getItem('token');
		console.error('mode:',mode.value);
		
		if(fileInput.files.length === 0){
			alert('Please select a zip file to submit.');
			return;
		}
		
		btn.disabled = true;
		statusText.textContent = 'Submitting job...';
		outputTerminal.textContent = '';

		// package file for multer
		const formData = new FormData();
		formData.append('fileZip', fileInput.files[0]);
		formData.append('lang', lang.value);
		formData.append('mode', mode.value);
		const timeoutValue = document.getElementById('timeout').value;
		const timeoutUnit = document.getElementById('timeoutUnit').value;
		const timeoutInSeconds = calculateTimeout(timeoutValue, timeoutUnit);
		if (timeoutInSeconds > 2 * 60 * 60){ // limit to 2 hours
			alert('Please enter a valid timeout value. Maximum is 2 hours.');
			btn.disabled = false;
			statusText.textContent = '';
			return;
		}
		formData.append('timeout', timeoutInSeconds * 1000); // convert to milliseconds
		statusText.textContent = 'Uploading to Server...';
		try{
			// send to api
			const response = await fetch(`${API_URL}/submit`, {
				method: 'POST',
				headers: {
					'Authorization': `Bearer ${token}`,
				},
				body: formData
			});
			const data = await response.json();
			
			if (response.status == 202){
				statusText.innerText = `Job queued...`;
				await startPolling(data.jobId);
			}else if (response.status == 401){
				// the jwt token has expired
				alert('Your session has expired. Login again');
				localStorage.removeItem('token');
				window.location.href = 'login.html';
				return;
			}else{
				throw new Error(data.error || 'Upload Failed');
			}
		}catch(err){
			statusText.innerText = `Job failed.`;
			outputTerminal.innerText = err.message || '';
			outputTerminal.classList.add('error');
			btn.disabled = false;
		}
	}
	let pollInterval = null;
	async function startPolling(jobId){
		const statusText = document.getElementById('statusText');
		const outputTerminal = document.getElementById('output');
		const btn = document.getElementById('submitBtn');
		const token = localStorage.getItem('token');
		// poll every 1000ms for status updates
		pollInterval = setInterval(async () =>{
			try{
				const response = await fetch(`${API_URL}/status/${jobId}`,{
					method: 'GET',
					headers: {
						'Authorization': `Bearer ${token}`,
					},
				});
				const data = await response.json();
				statusText.innerText = `Status : ${data.status || 'Unknown'}`;
				if(['COMPLETED','TERMINATED','FAILED','KILLED'].includes(data.status)){
					clearInterval(pollInterval);
					if (['TERMINATED', 'FAILED','KILLED'].includes(data.status) || data.stderr){
						outputTerminal.classList.add('error');
						outputTerminal.innerText = data.stderr || '';
					}else if (response.status == 401){
						// the jwt token has expired
						alert('Your session has expired. Login again');
						localStorage.removeItem('token');
						window.location.href = 'login.html';
						return;					
					}else{
						outputTerminal.classList.remove('error');
						outputTerminal.innerText = data.stdout || '';
					}
					btn.disabled = false;
				}
			}catch(err){
				clearInterval(pollInterval);
				statusText.innerText = `Server Error`;
				outputTerminal.classList.add('error');
				outputTerminal.innerText = err.message || '';
				btn.disabled = false;
			}
		},1000);
	}
	function calculateTimeout(timeoutValue, timeoutUnit){
		const unitMultipliers = {
			seconds: 1,
			minutes: 60,
			hours: 60 * 60,
		};
		return timeoutValue * (unitMultipliers[timeoutUnit] || 1000);
	}
	function handleTime(){
		const timeoutInput = document.getElementById('timeout');
		const timeoutUnitSelect = document.getElementById('timeoutUnit');
		const totalSeconds = calculateTimeout(timeoutInput.value, timeoutUnitSelect.value);
		const submitBtn = document.getElementById('submitBtn');
		if (totalSeconds > 2 * 60 * 60){ // limit to 2 hours
			timeoutInput.setCustomValidity('Timeout exceeds 2 hours. Please enter a valid value.');
			timeoutInput.style.border = '2px solid red';
			timeoutUnitSelect.style.border = '2px solid red';
			submitBtn.disabled = true;
		}else{
			timeoutInput.setCustomValidity('');
			timeoutInput.style.borderColor = '';
			timeoutUnitSelect.style.border = '';
			submitBtn.disabled = false;
		}
	}
	document.getElementById('timeout').addEventListener('input', handleTime);
	document.getElementById('timeoutUnit').addEventListener('change', handleTime);
	
</script>
</body>
</html>
