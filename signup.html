<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Distributed Job Scheduler</title>
	<style>
		
	</style>
</head>
<body>
<div class="card">
	<h2>Signup</h2>
	<input type="text" id="username" placeholder="Username"/>
	<input type="text" id="email" placeholder="Email-ID"/>
	<input type="password" id="password" placeholder="Password"/>
	<input type="password" id="password_check" placeholder="Re-Enter Password"/>
	<button id="signupBtn" onclick="signup()">Signup</button>
</div>
<script>
	const API_URL = 'http://localhost:3000';
    function signup(){
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password');
        const password_check = document.getElementById('password_check');

        if (password.value !== password_check.value){
            alert('Signup failed: Passwords do not match');
            password.value = "";
            password_check.value = "";
        }

        fetch(`${API_URL}/signup`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ username: username, email: email, password : password.value })
        })
        .then(response => response.json())
        .then(data => {
            if(data.message){
                alert('Signup successful!');
                window.location.href = 'login.html';
            } else {
                alert('Signup failed: ' + data.error);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('An error occurred during signup.');
        });
    }
</script>
</body>
</html>
